version: '3.8'

services:
  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - '18055:8055'
    environment:
      PORT: 8055
      KEY: ${DIRECTUS_KEY:-directus_key}
      SECRET: ${DIRECTUS_SECRET:-directus_secret}
      DB_CLIENT: sqlite3
    volumes:
      - ./directus-data:/directus/database
      - ./directus-data/uploads:/directus/uploads
    networks:
      - proxy-net
    env_file:
      - .env
      - .env.local
      - .env.production
      - .env.production.local

  api:
    build:
      context: .
      args:
        DIRECTUS_HOST: ${DIRECTUS_HOST:-http://host.docker.internal:18055}
    restart: unless-stopped
    networks:
      - proxy-net
    depends_on:
      - directus
    command: [node, apps/api/main.js]
    environment:
      - DIRECTUS_HOST=${DIRECTUS_HOST:-http://portfolio-directus-1:3001}
      - PORT=3001
      - HOST=0.0.0.0
      - CLOUDFLARE_AI_GATEWAY_TOKEN=${CLOUDFLARE_AI_GATEWAY_TOKEN:-}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CLOUDFLARE_TURNSTILE_SECRET_KEY=${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
      - AI_SYSTEM_PROMPT=${AI_SYSTEM_PROMPT:-}

  portfolio:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-}
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-}
        DIRECTUS_HOST: ${DIRECTUS_HOST:-http://host.docker.internal:18055}
        IMAGE_DOMAINS: ${IMAGE_DOMAINS:-portfolio-cms.mak-cloud.com}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: ${NEXT_PUBLIC_CLOUDFLARE_SITE_KEY:-}
    restart: unless-stopped
    ports:
      - '30000:3000'
    networks:
      - proxy-net
    depends_on:
      - directus
      - api
      - redis
    environment:
      # Runtime environment variables (BASE_PATH must match build-time value)
      - BASE_PATH=${BASE_PATH:-}
      - NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-}
      - DIRECTUS_HOST=${DIRECTUS_HOST:-http://host.docker.internal:18055}
      - IMAGE_DOMAINS=${IMAGE_DOMAINS:-portfolio-cms.mak-cloud.com}
      - NEXT_PUBLIC_GTM_ID=${NEXT_PUBLIC_GTM_ID:-}
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
      - NEXT_PUBLIC_CLOUDFLARE_SITE_KEY=${NEXT_PUBLIC_CLOUDFLARE_SITE_KEY:-}
      # Internal configuration - API_URL points to the api service
      - API_URL=http://api:3001
      - API_PORT=3001
      # Redis configuration for caching
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=${REDIS_URL:-}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ./redis-data:/data
    networks:
      - proxy-net
    command: redis-server --appendonly yes --notify-keyspace-events Exe

networks:
  proxy-net:
    driver: bridge
